site_name: RPDev | Security Analyst & Engineer
site_url: https://iamrpdev.github.io/
site_author: RPDev
site_description: Security Analyst, Engineer, and Hardware Hacker.

repo_name: IamRPDev/iamrpdev.github.io
repo_url: https://github.com/IamRPDev/iamrpdev.github.io
edit_uri: edit/main/docs/

theme:
  name: materialx
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - search.highlight
    - search.suggest

extra_css:
  - assets/css/theme.css
  - assets/css/terminal.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [scripts]
  - redirects:
      redirect_maps: {}

nav:
  - Home: index.md
  - About: about.md
  - Professional Expertise:
      - Enterprise Security: experience/security.md
      - Infrastructure & RF: experience/infrastructure.md
      - Technical Training: experience/training.md
      - Retro-Computing: experience/retro.md
  - Technical Documentation:
