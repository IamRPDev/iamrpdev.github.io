site_name: RPDev | Security Analyst & Engineer
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
    scheme: slate
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - search.highlight
    - search.share

extra_css:
  - assets/css/theme.css
  - assets/css/terminal.css

extra_javascript:
  - assets/js/terminal.js

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_profile.py
        - scripts/gen_skill_matrix.py
  - mkdocstrings:
      handlers:
        python:
          paths: [scripts]
  - minify:
      minify_html: true
  - redirects:
      redirect_maps: {}

nav:
  - Home: index.md
  - About: about.md
  - Professional Expertise:
    - Enterprise Security: experience/security.md
    - Infrastructure & RF: experience/infrastructure.md
    - Technical Training: experience/training.md
    - Retro-Computing: experience/retro.md
  - Technical Documentation:
    - Security: security.md
    - DevOps: devops.md
    - Hardware: hardware.md
  - Projects:
    - Overview: projects.md
    - OpenWRT Projects: projects/openwrt.md
  - Automated Profile: automated_profile.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - def_list
